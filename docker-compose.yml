services:
  synth-school:
    image: ghcr.io/YOUR_GITHUB_USERNAME/YOUR_REPO_NAME:main
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - profiles_data:/data

volumes:
  profiles_data:
    # Backup: docker run --rm -v synth-school_profiles_data:/data -v $(pwd):/out alpine tar czf /out/profiles-backup.tar.gz /data
